<!DOCTYPE html>
<html>
<head>
<title>Placement Portal - Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Campus Placement Portal</div>

<div class="wrapper">

<div class="panel">

<h2>Create Student Account</h2>

<input id="name" placeholder="Full Name">

<input id="roll_no" placeholder="Roll Number">

<input id="department" placeholder="Department">

<input id="cgpa" placeholder="Current CGPA">

<input id="skills" placeholder="Key Skills">

<input id="password" type="password" placeholder="Password">

<button onclick="registerStudent()">Create Account</button>

<p class="smallText">
Already registered? <a href="login.html">Login here</a>
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
